<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍽</text></svg>"/>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.7.0/dist/tabler-icons.min.css" rel="stylesheet"/>
    <title>Menu Famiglia</title>
    <style>
      :root{
        --bg:#F2F6F8; --card:#FFFFFF; --ink:#2C3338; --ink2:#8A949B; --ink3:#B4BEC4;
        --line:#E3EAEE; --acc:#6BA6C9; --accd:#2F6586; --accbg:#E2EEF5;
        --warn-bg:#F6ECD9; --warn-tx:#8A5A12;
      }
      *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;font-family:'Nunito',system-ui,sans-serif;}
      html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);}
      @keyframes mfFadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
      .mf-fade{animation:mfFadeIn .24s ease}
      .cap{font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--ink2);font-weight:600}
      .mf-card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:15px 16px}
      .mf-card.flush{padding:4px 16px}
      .mf-card.acc{background:var(--accbg);border-color:transparent;color:var(--accd)}
      .mf-card.solid{background:var(--accd);border-color:transparent;color:#fff}
      .mf-row{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--line)}
      .mf-row:last-child{border-bottom:none}
      .mf-ic{width:38px;height:38px;border-radius:12px;background:var(--accbg);color:var(--accd);
        display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
      .mf-track{height:7px;border-radius:7px;background:var(--line);overflow:hidden;flex:1}
      .mf-track>span{display:block;height:100%;background:var(--acc);border-radius:7px;transition:width .4s ease}
      .pill{font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px}
      .pill.ok{background:var(--accbg);color:var(--accd)}
      .pill.low{background:var(--warn-bg);color:var(--warn-tx)}
      /* bottom nav */
      .nav{display:flex;justify-content:space-between;align-items:flex-end;
        background:var(--card);border-top:1px solid var(--line);position:fixed;bottom:0;left:50%;
        transform:translateX(-50%);width:100%;max-width:390px;z-index:30;
        padding:10px 18px calc(12px + env(safe-area-inset-bottom))}
      .tab{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;
        color:var(--ink2);flex:1;cursor:pointer;border:none;background:none;font-family:inherit;
        transition:color .2s;font-weight:600}
      .tab i{font-size:23px}
      .tab.on{color:var(--accd);font-weight:700}
      .fab{width:50px;height:50px;border-radius:16px;background:var(--acc);color:#fff;
        display:flex;align-items:center;justify-content:center;font-size:25px;margin-top:-18px;
        border:3px solid var(--card);box-shadow:0 8px 18px -6px rgba(43,86,118,.5)}
      .tab.on .fab{background:var(--accd)}
      /* sheet */
      .sheet-back{position:fixed;inset:0;background:rgba(20,40,55,.32);z-index:50;
        display:flex;align-items:flex-end;justify-content:center;animation:mfFadeIn .2s ease}
      .sheet{width:100%;max-width:390px;background:var(--card);border-radius:24px 24px 0 0;
        padding:10px 18px 26px;animation:slideup .3s cubic-bezier(.2,.8,.2,1)}
      @keyframes slideup{from{transform:translateY(100%)}to{transform:translateY(0)}}
      .grab{width:38px;height:4px;background:var(--line);border-radius:4px;margin:4px auto 12px}
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
